<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XMR Mining Command Centre</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-state="idle">
<main class="app">
  <section class="hero">
    <div class="brand-lockup">
      <img class="brand-mark" src="./monero-xmr-logo.svg" alt="Monero logo" />
      <div>
        <p class="eyebrow">Command Centre</p>
        <h1>XMR Mining Command Centre</h1>
      </div>
    </div>
    <div class="status-card">
      <span class="status-light" aria-hidden="true"></span>
      <p id="status">Status: idle</p>
    </div>
  </section>

  <div id="bridgeBanner" class="bridge-banner" hidden>
    IPC bridge missing. Renderer loaded, but preload did not expose daemonApi.
  </div>
  <p id="actionFeedback" class="action-feedback" aria-live="polite"></p>

  <section class="panel controls daemon-controls">
    <label>
      Monero Daemon
      <input id="monerodPath" placeholder="Select monerod.exe" readonly />
    </label>
    <div class="button-row">
      <button id="chooseMonerod" type="button">Choose monerod.exe</button>
    </div>
  </section>

  <section class="panel controls mining-controls">
    <label>
      Wallet Address
      <input id="walletAddress" placeholder="4... (required for start_mining)" />
    </label>
    <label>
      Threads
      <input id="threads" type="number" min="1" max="128" value="2" />
    </label>
    <div class="button-row">
      <button id="startMining">Start Mining</button>
      <button id="stopMining">Stop Mining</button>
      <button id="refresh">Refresh Status</button>
    </div>
  </section>

  <section class="panel controls">
    <label>
      Limit Down (kB/s)
      <input id="limitDown" type="number" value="2048" />
    </label>
    <label>
      Limit Up (kB/s)
      <input id="limitUp" type="number" value="2048" />
    </label>
    <div class="button-row">
      <button id="setLimit">Apply Limit</button>
    </div>
  </section>

  <!-- ═══ MINE STAGE ═══ -->
  <div class="mine-stage" aria-label="Mining scene animation">
    <div class="stage-chrome" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
    <div class="stage-readout" id="stageReadout" aria-hidden="true">
      <span class="readout-label">Daemon Linked</span>
      <strong class="readout-state">Idle</strong>
    </div>

    <div id="spriteStage" class="sprite-stage" aria-hidden="true"></div>
    <div id="miner" class="scene-wrap legacy-scene" aria-hidden="true">
      <!-- shape-rendering="crispEdges" for Minecraft blocky pixel art look -->
      <svg class="mine-svg" viewBox="0 0 820 300"
           xmlns="http://www.w3.org/2000/svg"
           shape-rendering="crispEdges">
        <defs>
          <!-- Stone block tile (24×24) -->
          <pattern id="pStone" width="24" height="24" patternUnits="userSpaceOnUse">
            <rect width="24" height="24" fill="#3e444e"/>
            <rect x="1" y="1" width="22" height="22" fill="#4a5260"/>
            <rect x="2" y="2" width="20" height="1" fill="#606878" opacity="0.6"/>
            <rect x="2" y="2" width="1" height="20" fill="#606878" opacity="0.5"/>
            <rect x="6" y="7"  width="5" height="4" fill="#32373f" opacity="0.55"/>
            <rect x="14" y="15" width="6" height="3" fill="#32373f" opacity="0.4"/>
            <rect x="8" y="18" width="4" height="2" fill="#606878" opacity="0.35"/>
          </pattern>
          <!-- Dirt block tile (24×24) -->
          <pattern id="pDirt" width="24" height="24" patternUnits="userSpaceOnUse">
            <rect width="24" height="24" fill="#52320e"/>
            <rect x="1" y="1" width="22" height="22" fill="#6a4220"/>
            <rect x="2" y="2" width="20" height="1" fill="#7a5230" opacity="0.5"/>
            <rect x="5" y="7"  width="5" height="4" fill="#3e2208" opacity="0.5"/>
            <rect x="15" y="14" width="4" height="4" fill="#3e2208" opacity="0.4"/>
            <rect x="9" y="18" width="5" height="2" fill="#7a5230" opacity="0.4"/>
          </pattern>
          <!-- Wood plank tile (12×24) -->
          <pattern id="pWood" width="12" height="24" patternUnits="userSpaceOnUse">
            <rect width="12" height="24" fill="#5a3c10"/>
            <rect x="1" y="0" width="10" height="24" fill="#7a5428"/>
            <rect x="2" y="0" width="8" height="24" fill="#8a6438"/>
            <rect x="3" y="3"  width="6" height="2" fill="#9a7448" opacity="0.45"/>
            <rect x="3" y="9"  width="6" height="2" fill="#9a7448" opacity="0.45"/>
            <rect x="3" y="15" width="6" height="2" fill="#9a7448" opacity="0.45"/>
            <rect x="3" y="21" width="6" height="2" fill="#9a7448" opacity="0.45"/>
          </pattern>

          <!-- Torch-light radial (left torch) -->
          <radialGradient id="tgl1" cx="113" cy="86" r="170" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="rgba(255,170,50,0.38)"/>
            <stop offset="55%"  stop-color="rgba(255,120,20,0.10)"/>
            <stop offset="100%" stop-color="rgba(255,90,10,0)"/>
          </radialGradient>
          <!-- Torch-light radial (right torch) -->
          <radialGradient id="tgl2" cx="707" cy="86" r="170" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="rgba(255,170,50,0.32)"/>
            <stop offset="55%"  stop-color="rgba(255,120,20,0.08)"/>
            <stop offset="100%" stop-color="rgba(255,90,10,0)"/>
          </radialGradient>
          <!-- Center miner ambient -->
          <radialGradient id="minerAmb" cx="270" cy="160" r="200" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="rgba(255,200,80,0.10)"/>
            <stop offset="100%" stop-color="rgba(255,160,40,0)"/>
          </radialGradient>
          <!-- Ore block glow (mining/found) -->
          <radialGradient id="oreAmb" cx="452" cy="202" r="100" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="rgba(242,104,34,0.22)"/>
            <stop offset="100%" stop-color="rgba(242,104,34,0)"/>
          </radialGradient>

          <!-- Gem glow filter (uses shape-rendering auto override via group) -->
          <filter id="fGem" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- ══ CAVE BACKGROUND (always visible) ══ -->
        <!-- Full stone walls -->
        <rect x="0"  y="0"  width="820" height="300" fill="url(#pStone)"/>
        <!-- Cave air space -->
        <rect x="40" y="36" width="740" height="206" fill="#141820"/>
        <!-- Torch ambient overlays -->
        <rect x="40" y="36" width="740" height="206" fill="url(#tgl1)"/>
        <rect x="40" y="36" width="740" height="206" fill="url(#tgl2)"/>
        <rect x="40" y="36" width="740" height="206" fill="url(#minerAmb)"/>
        <!-- Ore ambient (visible mining/found) -->
        <rect class="ore-amb" x="40" y="36" width="740" height="206" fill="url(#oreAmb)" opacity="0"/>

        <!-- Left wall stone face -->
        <rect x="0"  y="36" width="40"  height="206" fill="url(#pStone)"/>
        <!-- Right wall stone face -->
        <rect x="780" y="36" width="40"  height="206" fill="url(#pStone)"/>

        <!-- Ceiling lower edge dark line -->
        <rect x="40" y="34" width="740" height="4" fill="#0c1016"/>

        <!-- Cave floor: dirt blocks -->
        <rect x="40" y="242" width="740" height="58" fill="url(#pDirt)"/>
        <!-- Floor top edge -->
        <rect x="40" y="240" width="740" height="3" fill="#241408"/>

        <!-- Stalactites (pixel blocks hanging from ceiling) -->
        <!-- Stala A -->
        <rect x="118" y="36" width="24" height="20" fill="url(#pStone)"/>
        <rect x="124" y="56" width="12" height="16" fill="url(#pStone)"/>
        <rect x="128" y="72" width="6"  height="10" fill="url(#pStone)"/>
        <!-- Stala B -->
        <rect x="268" y="36" width="20" height="16" fill="url(#pStone)"/>
        <rect x="272" y="52" width="12" height="12" fill="url(#pStone)"/>
        <rect x="276" y="64" width="6"  height="8"  fill="url(#pStone)"/>
        <!-- Stala C -->
        <rect x="548" y="36" width="22" height="18" fill="url(#pStone)"/>
        <rect x="554" y="54" width="12" height="14" fill="url(#pStone)"/>
        <rect x="558" y="68" width="6"  height="9"  fill="url(#pStone)"/>
        <!-- Stala D -->
        <rect x="672" y="36" width="18" height="14" fill="url(#pStone)"/>
        <rect x="676" y="50" width="10" height="10" fill="url(#pStone)"/>

        <!-- ══ LEFT WOODEN SUPPORT BEAM ══ -->
        <rect x="88"  y="40"  width="18" height="202" fill="url(#pWood)"/>
        <rect x="84"  y="40"  width="26" height="10"  fill="url(#pWood)"/><!-- cap top -->
        <rect x="84"  y="232" width="26" height="10"  fill="url(#pWood)"/><!-- cap bottom -->
        <!-- Horizontal strut (left) -->
        <rect x="106" y="134" width="130" height="14" fill="url(#pWood)"/>
        <rect x="84"  y="134" width="26"  height="14" fill="url(#pWood)"/>

        <!-- LEFT TORCH (on beam) -->
        <rect x="106" y="112" width="16" height="5" fill="#4a2c0a"/><!-- bracket -->
        <rect x="110" y="90"  width="8"  height="24" fill="#8b5c2a"/><!-- body -->
        <rect x="108" y="84"  width="12" height="8"  fill="#242424"/><!-- coal top -->
        <!-- Torch flame -->
        <g class="torch-flame tf1" style="transform-origin:114px 86px">
          <rect x="109" y="74" width="10" height="12" fill="#e07800"/>
          <rect x="111" y="66" width="6"  height="12" fill="#ffb820"/>
          <rect x="112" y="58" width="4"  height="10" fill="#ffe050"/>
          <rect x="113" y="52" width="2"  height="8"  fill="white" opacity="0.85"/>
        </g>

        <!-- ══ RIGHT WOODEN SUPPORT BEAM ══ -->
        <rect x="714" y="40"  width="18" height="202" fill="url(#pWood)"/>
        <rect x="710" y="40"  width="26" height="10"  fill="url(#pWood)"/>
        <rect x="710" y="232" width="26" height="10"  fill="url(#pWood)"/>
        <!-- Horizontal strut (right) -->
        <rect x="584" y="134" width="130" height="14" fill="url(#pWood)"/>
        <rect x="710" y="134" width="26"  height="14" fill="url(#pWood)"/>

        <!-- RIGHT TORCH (on beam) -->
        <rect x="698" y="112" width="16" height="5" fill="#4a2c0a"/>
        <rect x="702" y="90"  width="8"  height="24" fill="#8b5c2a"/>
        <rect x="700" y="84"  width="12" height="8"  fill="#242424"/>
        <g class="torch-flame tf2" style="transform-origin:706px 86px">
          <rect x="701" y="74" width="10" height="12" fill="#e07800"/>
          <rect x="703" y="66" width="6"  height="12" fill="#ffb820"/>
          <rect x="704" y="58" width="4"  height="10" fill="#ffe050"/>
          <rect x="705" y="52" width="2"  height="8"  fill="white" opacity="0.85"/>
        </g>

        <!-- ══ HASH RAIN (mining state only, text-rendering auto for legibility) ══ -->
        <g class="hash-rain-svg" text-rendering="auto">
          <text class="hash-char hc1" x="580" y="72"  font-size="10" fill="rgba(105,232,240,0.32)" font-family="monospace">0x8b70</text>
          <text class="hash-char hc2" x="638" y="92"  font-size="10" fill="rgba(105,232,240,0.25)" font-family="monospace">rx/0</text>
          <text class="hash-char hc3" x="598" y="112" font-size="10" fill="rgba(105,232,240,0.20)" font-family="monospace">nonce</text>
          <text class="hash-char hc4" x="656" y="66"  font-size="10" fill="rgba(105,232,240,0.28)" font-family="monospace">hash</text>
          <text class="hash-char hc5" x="616" y="130" font-size="9"  fill="rgba(105,232,240,0.16)" font-family="monospace">3f9a</text>
        </g>

        <!-- ══════════════════════════════════════
             STATE: IDLE
             Miner sits on stone block, hammer leans against beam
        ══════════════════════════════════════ -->
        <g class="s-idle">
          <!-- Seat block (Minecraft stone block) -->
          <rect x="238" y="218" width="48" height="24" fill="#4a5260"/>
          <rect x="239" y="219" width="46" height="22" fill="#585e6a"/>
          <rect x="240" y="219" width="44" height="1"  fill="#6a7280" opacity="0.6"/>
          <rect x="240" y="219" width="1"  height="22" fill="#6a7280" opacity="0.5"/>
          <rect x="262" y="219" width="1"  height="22" fill="#3e4450" opacity="0.6"/><!-- divider -->
          <rect x="240" y="238" width="45" height="2"  fill="#32373f" opacity="0.5"/>
          <!-- Block label / subtle XMR vein -->
          <rect x="244" y="224" width="6" height="5" fill="#f26822" opacity="0.35"/>
          <rect x="272" y="228" width="8" height="4" fill="#f26822" opacity="0.25"/>

          <!-- Pickaxe leaning against left beam -->
          <!-- Handle (slightly angled — use transform) -->
          <g transform="rotate(-9, 96, 242)">
            <rect x="92" y="112" width="8" height="132" fill="#7a4e2a"/>
            <rect x="93" y="112" width="3" height="132" fill="#5a3810"/>
            <!-- Pick head -->
            <rect x="76" y="104" width="40" height="12" fill="#8090a0"/>
            <rect x="78" y="96"  width="36" height="10" fill="#a0b0c0"/>
            <rect x="80" y="97"  width="32" height="3"  fill="#c0d0e0" opacity="0.55"/>
            <!-- Left spike -->
            <rect x="74" y="98"  width="6" height="18" fill="#6a7888"/>
            <!-- Right spike -->
            <rect x="116" y="104" width="6" height="12" fill="#6a7888"/>
          </g>

          <!-- IDLE MINER — sitting, blocky Minecraft style -->
          <g class="idle-miner-mc">
            <!-- Ground shadow -->
            <ellipse cx="270" cy="244" rx="32" ry="5" fill="#000" opacity="0.28"/>

            <!-- LEFT LEG: thigh extends left, shin hangs down -->
            <rect x="222" y="216" width="32" height="14" fill="#1a2838"/><!-- thigh left -->
            <rect x="222" y="216" width="8"  height="14" fill="#101820"/>
            <rect x="222" y="228" width="18" height="20" fill="#1a2838"/><!-- shin -->
            <rect x="222" y="240" width="20" height="10" fill="#2a1800"/><!-- boot -->
            <rect x="222" y="240" width="5"  height="10" fill="#1a0e00"/>

            <!-- RIGHT LEG: thigh extends right, shin hangs down -->
            <rect x="286" y="216" width="32" height="14" fill="#1a2838"/>
            <rect x="310" y="216" width="8"  height="14" fill="#101820"/>
            <rect x="300" y="228" width="18" height="20" fill="#1a2838"/>
            <rect x="300" y="240" width="20" height="10" fill="#2a1800"/>
            <rect x="314" y="240" width="6"  height="10" fill="#1a0e00"/>

            <!-- Torso -->
            <rect x="254" y="152" width="32" height="66" fill="#2a4a8e"/>
            <rect x="254" y="152" width="6"  height="66" fill="#1a3268"/>
            <rect x="258" y="162" width="12" height="10" fill="#1a3268"/><!-- pocket -->
            <rect x="254" y="212" width="32" height="6"  fill="#0e1828"/><!-- belt -->
            <rect x="264" y="213" width="12" height="4"  fill="#f26822" opacity="0.65"/>

            <!-- Left arm (resting on thigh) -->
            <rect x="238" y="152" width="16" height="44" fill="#1a3268"/>
            <rect x="238" y="152" width="4"  height="44" fill="#102050"/>
            <rect x="236" y="192" width="18" height="12" fill="#5a3822"/><!-- glove -->

            <!-- Right arm (resting at side) -->
            <rect x="286" y="152" width="16" height="40" fill="#2a4a8e"/>
            <rect x="296" y="152" width="6"  height="40" fill="#1a3268"/>
            <rect x="284" y="188" width="18" height="12" fill="#5a3822"/>

            <!-- Neck -->
            <rect x="262" y="144" width="16" height="10" fill="#c8946a"/>

            <!-- Head (8×8 mc px = 32×32) -->
            <rect x="254" y="112" width="32" height="32" fill="#c8946a"/>
            <rect x="254" y="112" width="6"  height="32" fill="#a87050"/>
            <!-- Eyes: relaxed/half-lidded -->
            <rect x="260" y="121" width="8" height="5" fill="#2c1a0a"/>
            <rect x="276" y="121" width="8" height="5" fill="#2c1a0a"/>
            <rect x="262" y="122" width="3" height="2" fill="white" opacity="0.55"/>
            <rect x="278" y="122" width="3" height="2" fill="white" opacity="0.55"/>
            <!-- Nose -->
            <rect x="270" y="128" width="5" height="5" fill="#a07040"/>
            <!-- Neutral mouth -->
            <rect x="261" y="136" width="18" height="4" fill="#9a6030"/>
            <rect x="263" y="140" width="14" height="2" fill="#c07848" opacity="0.4"/>

            <!-- Hard hat -->
            <rect x="250" y="109" width="40" height="6" fill="#c04000"/><!-- brim -->
            <rect x="254" y="88"  width="32" height="24" fill="#f26822"/><!-- dome -->
            <rect x="254" y="88"  width="6"  height="24" fill="#d04500"/>
            <rect x="262" y="91"  width="14" height="9"  fill="#c04000"/><!-- lamp housing -->
            <rect x="264" y="92"  width="10" height="7"  fill="#ffd060"/>
            <rect x="265" y="93"  width="7"  height="4"  fill="white" opacity="0.65"/>
          </g>
        </g>

        <!-- ══════════════════════════════════════
             STATE: MINING
             Miner swings pickaxe at XMR ore block
        ══════════════════════════════════════ -->
        <g class="s-mining">
          <!-- Ore ambient glow (appears in mining state) -->

          <!-- XMR ORE BLOCK (80×80 — sits on floor) -->
          <g class="mining-ore-block">
            <!-- Stone base face -->
            <rect x="412" y="162" width="80" height="80" fill="#4a5260"/>
            <rect x="413" y="163" width="78" height="78" fill="#585e6a"/>
            <!-- Block grid seams -->
            <rect x="436" y="162" width="2" height="80" fill="#3a404e"/>
            <rect x="460" y="162" width="2" height="80" fill="#3a404e"/>
            <rect x="412" y="186" width="80" height="2" fill="#3a404e"/>
            <rect x="412" y="210" width="80" height="2" fill="#3a404e"/>
            <!-- XMR orange ore veins -->
            <rect x="414" y="164" width="14" height="11" fill="#f26822"/>
            <rect x="456" y="168" width="12" height="10" fill="#f26822"/>
            <rect x="464" y="190" width="14" height="12" fill="#f26822"/>
            <rect x="432" y="212" width="16" height="12" fill="#f26822"/>
            <rect x="462" y="218" width="12" height="16" fill="#f26822"/>
            <rect x="414" y="226" width="10" height="12" fill="#e05500"/>
            <!-- Ore highlights -->
            <rect x="415" y="165" width="10" height="4" fill="#ffd060" opacity="0.65"/>
            <rect x="457" y="169" width="8"  height="4" fill="#ffd060" opacity="0.55"/>
            <rect x="433" y="213" width="10" height="4" fill="#ffd060" opacity="0.45"/>
            <!-- Top face highlight -->
            <rect x="413" y="163" width="78" height="3" fill="#6a7484" opacity="0.6"/>
            <rect x="413" y="163" width="3"  height="78" fill="#6a7484" opacity="0.45"/>
            <!-- Right/bottom shadow -->
            <rect x="488" y="166" width="4" height="76" fill="#2e3440" opacity="0.55"/>
            <rect x="416" y="236" width="76" height="4" fill="#2e3440" opacity="0.55"/>
          </g>

          <!-- Block crack overlays (appear on hammer impact) -->
          <g class="blk-crack-1">
            <line x1="438" y1="163" x2="428" y2="200" stroke="#101418" stroke-width="2.5"/>
            <line x1="428" y1="200" x2="444" y2="230" stroke="#101418" stroke-width="2.5"/>
            <line x1="466" y1="166" x2="460" y2="193" stroke="#101418" stroke-width="2"/>
            <line x1="460" y1="193" x2="470" y2="212" stroke="#101418" stroke-width="2"/>
          </g>
          <g class="blk-crack-2">
            <line x1="423" y1="170" x2="413" y2="214" stroke="#080c10" stroke-width="3"/>
            <line x1="413" y1="214" x2="434" y2="240" stroke="#080c10" stroke-width="3"/>
            <line x1="478" y1="165" x2="489" y2="222" stroke="#080c10" stroke-width="2"/>
            <line x1="450" y1="178" x2="438" y2="240" stroke="#080c10" stroke-width="2"/>
            <line x1="454" y1="193" x2="466" y2="216" stroke="#080c10" stroke-width="1.5"/>
          </g>

          <!-- Chips flying off on impact -->
          <rect class="mc-chip c1" x="404" y="218" width="14" height="10" fill="#585e6a"/>
          <rect class="mc-chip c2" x="393" y="200" width="12" height="9"  fill="#f26822"/>
          <rect class="mc-chip c3" x="398" y="232" width="16" height="11" fill="#585e6a"/>
          <rect class="mc-chip c4" x="382" y="214" width="10" height="8"  fill="#626870"/>
          <rect class="mc-chip c5" x="396" y="182" width="12" height="9"  fill="#f26822"/>
          <rect class="mc-chip c6" x="406" y="225" width="7"  height="6"  fill="#9aa0ae" opacity="0.8"/>
          <rect class="mc-chip c7" x="390" y="207" width="6"  height="5"  fill="#9aa0ae" opacity="0.6"/>

          <!-- MINING MINER (standing, blocky MC style) -->
          <g class="mining-miner-mc">
            <ellipse cx="270" cy="244" rx="30" ry="5" fill="#000" opacity="0.3"/>

            <!-- Left leg -->
            <rect x="254" y="196" width="15" height="46" fill="#1a2838"/>
            <rect x="254" y="196" width="4"  height="46" fill="#101820"/>
            <rect x="253" y="228" width="18" height="14" fill="#2a1800"/>
            <rect x="253" y="228" width="4"  height="14" fill="#1a0e00"/>
            <!-- Right leg -->
            <rect x="271" y="196" width="15" height="46" fill="#1a2838"/>
            <rect x="282" y="196" width="4"  height="46" fill="#101820"/>
            <rect x="271" y="228" width="18" height="14" fill="#2a1800"/>
            <rect x="283" y="228" width="5"  height="14" fill="#1a0e00"/>

            <!-- Body -->
            <rect x="254" y="146" width="32" height="50" fill="#2a4a8e"/>

<script src="./vendor/pixi.min.js"></script>
<script src="./app.js"></script>
<script>
  const readoutState = document.getElementById('stageReadout')?.querySelector('.readout-state');
  const stateLabels = { idle:'Idle', starting:'Starting…', mining:'Mining Active', 'block-found':'Block Found!', error:'Error' };
  new MutationObserver(() => {
    const s = document.body.dataset.state || 'idle';
    if (readoutState) readoutState.textContent = stateLabels[s] || s;
  }).observe(document.body, { attributes:true, attributeFilter:['data-state'] });
</script>
